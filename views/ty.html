<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/public/Images/GTV_BLACK_MAN.png" type="image/svg+xml">
    <title>Thank You :&#41; | GTV Tours</title>
    <link href='https://fonts.googleapis.com/css?family=Sansita' rel='stylesheet'>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@900&display=swap" rel="stylesheet">

    <!-- CSS Files -->
    <style>
      :root{
    --dark-gray:#071219;
    --gray:#0c1c28;
    --medium-gray:#36454f;
    --light-gray:#6d6d6d;
    --white-shade:#e9ebed;
    --light-blue:#57a3be;
    --navy-blue:#006092;
    --dark-navyblue:#0c1c29;
    --darkest-navyblue:#081319;
    --dark-brown:#4a4a46;
    --green:#04AA6D;
    --red:#D2042D;
    --orange:#ffa500;
  
    --section-padding:60px;

    --hue: 223;
    --bg: hsl(var(--hue),90%,25%);
    --fg: hsl(var(--hue),10%,90%);
    --trans-dur: 0.3s;
}

  html{ 
    scroll-behavior: smooth;
    padding:0;
    margin: 0;
    overflow-x: hidden;
  }
  
  body{
  margin: 0;
  padding: 0;
  background: url('/public/Images/map.png');
  background-repeat: no-repeat;
  background-position: center;
  background-size: cover;
  }
  
  /* Scroll bar */
  ::-webkit-scrollbar{
  width: 8px;
  background: var(--medium-gray);
  }
  ::-webkit-scrollbar-thumb{
    background-color: var(--white-shade);
    border-radius: 2px;
  }

  /* Loading-Container */
  .loading-container {
    text-align: center;
    margin: auto;
    margin-top: 20%;
    width: 50%;
  }

  /* loading animation */
  .pl {
    display: block;
    margin: auto;
    width: 4.375em;
    height: 4.375em;
  }
  .pl__arrows,
  .pl__ring-rotate,
  .pl__ring-stroke,
  .pl__tick {
    animation-duration: 2s;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
  }
  .pl__arrows {
    animation-name: arrows;
    transform: rotate(45deg);
    transform-origin: 16px 52px;
  }
  .pl__ring-rotate,
  .pl__ring-stroke {
    transform-origin: 80px 80px;
  }
  .pl__ring-rotate {
    animation-name: ringRotate;
  }
  .pl__ring-stroke {
    animation-name: ringStroke;
    transform: rotate(-45deg);
  }
  .pl__tick {
    animation-name: tick;
  }
  .pl__tick:nth-child(2) {
    animation-delay: -1.75s;
  }
  .pl__tick:nth-child(3) {
    animation-delay: -1.5s;
  }
  .pl__tick:nth-child(4) {
    animation-delay: -1.25s;
  }
  .pl__tick:nth-child(5) {
    animation-delay: -1s;
  }
  .pl__tick:nth-child(6) {
    animation-delay: -0.75s;
  }
  .pl__tick:nth-child(7) {
    animation-delay: -0.5s;
  }
  .pl__tick:nth-child(8) {
    animation-delay: -0.25s;
  }
  
  /* Animations */
  @keyframes arrows {
    from {
      transform: rotate(45deg);
    }
    to {
      transform: rotate(405deg);
    }
  }
  @keyframes ringRotate {
    from {
      transform: rotate(0);
    }
    to {
      transform: rotate(720deg);
    }
  }
  @keyframes ringStroke {
    from,
    to {
      stroke-dashoffset: 452;
      transform: rotate(-45deg);
    }
    50% {
      stroke-dashoffset: 169.5;
      transform: rotate(-180deg);
    }
  }
  @keyframes tick {
    from,
    3%,
    47%,
    to {
      stroke-dashoffset: -12;
    }
    14%,
    36% {
      stroke-dashoffset: 0;
    }
  }
  
  #thankYouMessage {
  display: none;
  text-align: center;
  margin: auto;
  margin-top: 6%;
  background: url('/SVGs/wave.svg');
  background-repeat: no-repeat;
  background-position: bottom;
  -webkit-box-shadow: 0px 0px 38px -8px rgba(0,0,0,0.34);
  -moz-box-shadow: 0px 0px 38px -8px rgba(0,0,0,0.34);
  box-shadow: 0px 0px 38px -8px rgba(0,0,0,0.34);
  color: var(--navy-blue);
  font-family: 'Poppins', sans-serif;
  width: 85%;
  max-width: 600px;
  padding: 20px 20px 10px 20px;
  border-radius: 20px;
}
#thankYouMessage p{
  color: var(--navy-blue);
}
#home-btn{
    font-family: 'Sansita';
    font-size: 14px;
    background-color: transparent;
    color: var(--navy-blue);
    border: 2px solid var(--navy-blue);
    border-radius: 50px;
    padding: 14px 36px 14px 36px;
    cursor: pointer;
}
#home-btn:is(:hover, :focus){
    background: hsla(0, 0%, 100%, 0.4);
    color: var(--navy-blue);
}
#p-btn{
    font-family: 'Sansita';
    font-size: 14px;
    background-color: var(--navy-blue);
    color: var(--white-shade);
    border: none;
    border-radius: 50px;
    padding: 16px 38px 16px 38px;
    cursor: pointer;
}
#p-btn:is(:hover, :focus){
    background: hsla(0, 0%, 100%, 0.4);
    color: var(--navy-blue);
}
#thankYouMessage img{
  height: auto;
  width: 40%;
  position: relative;
  animation-name: boat;
  animation-duration: 3s;
}
@keyframes boat {
  0%   {right: -120px; width: 10%;}
  100%  {right: 0px; width: 40%;}
}

#thankyou{
  font-size: 40px;
  font-weight: 900;
}

@media (max-width: 578px) {
  #thankYouMessage img{
    height: auto;
    width: 60%;
  }
  @keyframes boat {
    0%   {right:-120px; width: 10%;}
    100%  {right: 0px; width: 60%;}
  }
}
    </style>
</head>
<body>

                <polyline class="pl__tick" stroke="hsl(223,90%,80%)" points="0,2 0,14" transform="rotate(45,0,0) translate(0,40)" />
                <polyline class="pl__tick" stroke="hsl(223,90%,80%)" points="0,2 0,14" transform="rotate(90,0,0) translate(0,40)" />
                <polyline class="pl__tick" stroke="hsl(223,90%,80%)" points="0,2 0,14" transform="rotate(135,0,0) translate(0,40)" />
                <polyline class="pl__tick" stroke="hsl(223,90%,80%)" points="0,2 0,14" transform="rotate(180,0,0) translate(0,40)" />
              </g>
            </g>
            <!-- Arrows -->
            <g>
              <g transform="translate(64,28)">
                <g class="pl__arrows" transform="rotate(45,16,52)">
                  <path fill="hsl(3,90%,55%)" d="M17.998,1.506l13.892,43.594c.455,1.426-.56,2.899-1.998,2.899H2.108c-1.437,0-2.452-1.473-1.998-2.899L14.002,1.506c.64-2.008,3.356-2.008,3.996,0Z"/>
                  <path fill="hsl(223,10%,90%)" d="M14.009,102.499L.109,58.889c-.453-1.421,.559-2.889,1.991-2.889H29.899c1.433,0,2.444,1.468,1.991,2.889l-13.899,43.61c-.638,2.001-3.345,2.001-3.983,0Z"/>

                  <path fill="hsl(333,90%,55%)" d="M17.998,1.506l13.892,43.594c.455,1.426-.56,2.899-1.998,2.899H2.108c-1.437,0-2.452-1.473-1.998-2.899L14.002,1.506c.64-2.008,3.356-2.008,3.996,0Z"/>
